backend:
  name: git-gateway
  branch: main

media_folder: "media"
public_folder: "/media"

locale: fr

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      # ── EVENT FRAMES — PACKS ──────────────────────
      - name: "event-frames"
        label: "Event Frames — Packs & Tarifs"
        file: "data/event-frames.json"
        fields:
          - label: "Pack Starter"
            name: "starter"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex : 180€"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
                hint: "Une prestation par ligne"
          - label: "Pack Premium"
            name: "premium"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex : 350€"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
          - label: "Pack VIP"
            name: "vip"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex : 500€"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"

      # ── EVENT DECOR — TARIF ───────────────────────
      - name: "event-decor"
        label: "Event Decor — Tarif"
        file: "data/event-decor.json"
        fields:
          - label: "Prix affiché (ex : 150€)"
            name: "ctaPrice"
            widget: "string"
          - label: "Sous-titre"
            name: "ctaSub"
            widget: "string"

      # ── CONTACT — BIO & RÉSEAUX ───────────────────
      - name: "contact"
        label: "Contact — Bio & Réseaux sociaux"
        file: "data/contact.json"
        fields:
          - label: "Paragraphes de la bio"
            name: "bio"
            widget: "list"
            hint: "Un paragraphe par ligne"
          - label: "Instagram — compte (ex : Mdt.Event)"
            name: "instagramHandle"
            widget: "string"
          - label: "Instagram — lien"
            name: "instagramUrl"
            widget: "string"
          - label: "Snapchat — compte"
            name: "snapchatHandle"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"

      # ── EVENT DESIGN — IMAGE TARIFAIRE ────────────
      - name: "event-design"
        label: "Event Design — Grille tarifaire"
        file: "data/event-design.json"
        fields:
          - label: "Image de la grille tarifaire"
            name: "pricingImage"
            widget: "image"
            hint: "Image affichée en bas de la page Event Design"

      # ── ACCUEIL — PORTRAIT ────────────────────────
      - name: "index"
        label: "Accueil — Image portrait"
        file: "data/index.json"
        fields:
          - label: "Photo portrait (section Bienvenue)"
            name: "bienvenueImage"
            widget: "image"
            hint: "Photo affichée à droite dans la section Bienvenue"

      # ── GALERIE — IMAGES ──────────────────────────
      - name: "galerie"
        label: "Galerie — Toutes les images"
        file: "data/galerie.json"
        fields:
          - label: "Pochettes Musicales"
            name: "pochettes"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les pochettes"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Logos"
            name: "logos"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les logos"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Flyers"
            name: "flyers"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les flyers"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Invitations"
            name: "invitations"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les invitations"
            field:
              label: "Image"
              name: "image"
              widget: "image"
