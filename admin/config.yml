backend:
  name: git-gateway
  branch: main

media_folder: "media"
public_folder: "/media"

locale: fr

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      # ── ACCUEIL ───────────────────────────────────
      - name: "index"
        label: "Accueil"
        file: "data/index.json"
        fields:
          - label: "Photo hero (fond de la page d'accueil)"
            name: "heroBg"
            widget: "image"
          - label: "Texte eyebrow (ex : Online Book)"
            name: "heroEyebrow"
            widget: "string"
          - label: "Sous-titre hero"
            name: "heroSub"
            widget: "string"
            hint: "Ex : Création Visuelle · Événementiel · Décoration"
          - label: "Tagline hero"
            name: "heroTagline"
            widget: "string"
            hint: "Ex : MDT Event Planner · MDT Event Frames"
          - label: "Texte bienvenue — paragraphe 1"
            name: "bienvenueBody1"
            widget: "text"
          - label: "Texte bienvenue — paragraphe 2"
            name: "bienvenueBody2"
            widget: "text"
          - label: "Photo portrait (section Bienvenue)"
            name: "bienvenueImage"
            widget: "image"
          - label: "Vidéo de présentation (page accueil)"
            name: "homeVideo"
            widget: "file"
            hint: "Fichier MP4 — remplacer Accueil.mp4"
          - label: "Liste — Pourquoi faire appel à nous"
            name: "bienvenueListItems"
            widget: "list"
            hint: "Les 4 raisons affichées sous la section Bienvenue"
          - label: "Points forts (section Pourquoi nous)"
            name: "pourquoiPoints"
            widget: "text"
            hint: "Séparer chaque point avec · "

      # ── EVENT FRAMES — PACKS & VIDÉOS ────────────
      - name: "event-frames"
        label: "Event Frames"
        file: "data/event-frames.json"
        fields:
          - label: "Pack Starter"
            name: "starter"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex : 180€"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
                hint: "Une prestation par ligne"
          - label: "Pack Premium"
            name: "premium"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
          - label: "Pack VIP"
            name: "vip"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
          - label: "Vidéo DVM Show 1"
            name: "videoDvm1"
            widget: "file"
            hint: "Fichier MP4"
          - label: "Vidéo DVM Show 2"
            name: "videoDvm2"
            widget: "file"
          - label: "Vidéo DVM Show 3"
            name: "videoDvm3"
            widget: "file"
          - label: "Titre section 1 — Checklist"
            name: "checklistCreateurTitle"
            widget: "string"
          - label: "Checklist — Pourquoi un créateur de contenu"
            name: "checklistCreateur"
            widget: "list"
            hint: "Un argument par ligne"
          - label: "Titre section 2 — Checklist"
            name: "checklistMDTTitle"
            widget: "string"
          - label: "Checklist — Pourquoi MDT Event Frames"
            name: "checklistMDT"
            widget: "list"
            hint: "Un argument par ligne"

      # ── EVENT DECOR ───────────────────────────────
      - name: "event-decor"
        label: "Event Decor"
        file: "data/event-decor.json"
        fields:
          - label: "Photo hero (fond de la page Decor)"
            name: "heroBg"
            widget: "image"
          - label: "Catégories (ex : Valentine's Day · Anniversaire)"
            name: "heroCategories"
            widget: "string"
          - label: "Texte inclus (ex : Matériel — Main d'œuvre...)"
            name: "heroIncluded"
            widget: "string"
          - label: "Prix affiché (ex : 150€)"
            name: "ctaPrice"
            widget: "string"
          - label: "Sous-titre prix"
            name: "ctaSub"
            widget: "string"
          - label: "Vidéo Mariage"
            name: "videoMarriage"
            widget: "file"
            hint: "Fichier MP4"
          - label: "Vidéo Décoration Mariage"
            name: "videoDecoMarriage"
            widget: "file"
          - label: "Vidéo Demande en mariage"
            name: "videoDemande"
            widget: "file"
          - label: "Vidéo Saint-Valentin 1"
            name: "videoSaint1"
            widget: "file"
          - label: "Vidéo Saint-Valentin 2"
            name: "videoSaint2"
            widget: "file"
          - label: "Vidéo Saint-Valentin 3"
            name: "videoSaint3"
            widget: "file"
          - label: "Titre section Saint-Valentin"
            name: "saintValTitle"
            widget: "string"
          - label: "Texte CTA (ex : À partir de)"
            name: "ctaFrom"
            widget: "string"

      # ── EVENT FRAMES — CHECKLISTS ────────────────
      # (ajouté dans le même fichier event-frames)

      # ── EVENT DESIGN ──────────────────────────────
      - name: "event-design"
        label: "Event Design — Services & Tarifs"
        file: "data/event-design.json"
        fields:
          - label: "Image de la grille tarifaire"
            name: "pricingImage"
            widget: "image"
            hint: "Image affichée en bas de la page Event Design"
          - label: "Flyer — Nom"
            name: "flyerName"
            widget: "string"
          - label: "Flyer — Description"
            name: "flyerDesc"
            widget: "text"
          - label: "Pochette Musicale — Nom"
            name: "pochetteName"
            widget: "string"
          - label: "Pochette Musicale — Description"
            name: "pochetteDesc"
            widget: "text"
          - label: "Logo — Nom"
            name: "logoName"
            widget: "string"
          - label: "Logo — Description"
            name: "logoDesc"
            widget: "text"
          - label: "Vidéo Animée — Nom"
            name: "videoAnimName"
            widget: "string"
          - label: "Vidéo Animée — Description"
            name: "videoAnimDesc"
            widget: "text"
          - label: "Dossier de Presse — Nom"
            name: "dossierName"
            widget: "string"
          - label: "Dossier de Presse — Description"
            name: "dossierDesc"
            widget: "text"

      # ── CONTACT — BIO & RÉSEAUX ───────────────────
      - name: "contact"
        label: "Contact — Bio & Réseaux sociaux"
        file: "data/contact.json"
        fields:
          - label: "Photo de fond (côté droit)"
            name: "profileBg"
            widget: "image"
          - label: "Paragraphes de la bio"
            name: "bio"
            widget: "list"
            hint: "Un paragraphe par ligne"
          - label: "Instagram — compte (ex : Mdt.Event)"
            name: "instagramHandle"
            widget: "string"
          - label: "Instagram — lien"
            name: "instagramUrl"
            widget: "string"
          - label: "Snapchat — compte"
            name: "snapchatHandle"
            widget: "string"
          - label: "Snapchat — lien"
            name: "snapchatUrl"
            widget: "string"
          - label: "Adresse email"
            name: "email"
            widget: "string"
          - label: "Email affiché (texte visible)"
            name: "emailLabel"
            widget: "string"
          - label: "Titre de la page (ex : Qui suis-je ?)"
            name: "pageTitle"
            widget: "string"
          - label: "Signature (ex : — MDT Event)"
            name: "signature"
            widget: "string"

      # ── GALERIE — IMAGES ──────────────────────────
      - name: "galerie"
        label: "Galerie — Toutes les images"
        file: "data/galerie.json"
        fields:
          - label: "Pochettes Musicales"
            name: "pochettes"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les pochettes"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Logos"
            name: "logos"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Flyers"
            name: "flyers"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Invitations"
            name: "invitations"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Sous-titre Pochettes (ex : Design visuel — Identité artistique)"
            name: "pochettesSub"
            widget: "string"
          - label: "Vidéos Animées"
            name: "animatedVideos"
            widget: "list"
            hint: "Ajoute ou remplace les vidéos animées"
            field:
              label: "Vidéo"
              name: "video"
              widget: "file"
