backend:
  name: git-gateway
  branch: main

media_folder: "media"
public_folder: "/media"

locale: fr

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      # ── ACCUEIL ───────────────────────────────────
      - name: "index"
        label: "Accueil"
        file: "data/index.json"
        fields:
          - label: "Photo hero (fond de la page d'accueil)"
            name: "heroBg"
            widget: "image"
          - label: "Texte eyebrow (ex : Online Book)"
            name: "heroEyebrow"
            widget: "string"
          - label: "Sous-titre hero"
            name: "heroSub"
            widget: "string"
            hint: "Ex : Création Visuelle · Événementiel · Décoration"
          - label: "Tagline hero"
            name: "heroTagline"
            widget: "string"
            hint: "Ex : MDT Event Planner · MDT Event Frames"
          - label: "Texte bienvenue — paragraphe 1"
            name: "bienvenueBody1"
            widget: "text"
          - label: "Texte bienvenue — paragraphe 2"
            name: "bienvenueBody2"
            widget: "text"
          - label: "Photo portrait (section Bienvenue)"
            name: "bienvenueImage"
            widget: "image"
          - label: "Vidéo de présentation (page accueil)"
            name: "homeVideo"
            widget: "file"
            hint: "Fichier MP4 — remplacer Accueil.mp4"

      # ── EVENT FRAMES — PACKS & VIDÉOS ────────────
      - name: "event-frames"
        label: "Event Frames"
        file: "data/event-frames.json"
        fields:
          - label: "Pack Starter"
            name: "starter"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex : 180€"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
                hint: "Une prestation par ligne"
          - label: "Pack Premium"
            name: "premium"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
          - label: "Pack VIP"
            name: "vip"
            widget: "object"
            fields:
              - label: "Prix"
                name: "price"
                widget: "string"
              - label: "Prestations incluses"
                name: "features"
                widget: "list"
          - label: "Vidéo DVM Show 1"
            name: "videoDvm1"
            widget: "file"
            hint: "Fichier MP4"
          - label: "Vidéo DVM Show 2"
            name: "videoDvm2"
            widget: "file"
          - label: "Vidéo DVM Show 3"
            name: "videoDvm3"
            widget: "file"

      # ── EVENT DECOR ───────────────────────────────
      - name: "event-decor"
        label: "Event Decor"
        file: "data/event-decor.json"
        fields:
          - label: "Photo hero (fond de la page Decor)"
            name: "heroBg"
            widget: "image"
          - label: "Catégories (ex : Valentine's Day · Anniversaire)"
            name: "heroCategories"
            widget: "string"
          - label: "Texte inclus (ex : Matériel — Main d'œuvre...)"
            name: "heroIncluded"
            widget: "string"
          - label: "Prix affiché (ex : 150€)"
            name: "ctaPrice"
            widget: "string"
          - label: "Sous-titre prix"
            name: "ctaSub"
            widget: "string"
          - label: "Vidéo Mariage"
            name: "videoMarriage"
            widget: "file"
            hint: "Fichier MP4"
          - label: "Vidéo Décoration Mariage"
            name: "videoDecoMarriage"
            widget: "file"
          - label: "Vidéo Demande en mariage"
            name: "videoDemande"
            widget: "file"
          - label: "Vidéo Saint-Valentin 1"
            name: "videoSaint1"
            widget: "file"
          - label: "Vidéo Saint-Valentin 2"
            name: "videoSaint2"
            widget: "file"
          - label: "Vidéo Saint-Valentin 3"
            name: "videoSaint3"
            widget: "file"

      # ── EVENT DESIGN ──────────────────────────────
      - name: "event-design"
        label: "Event Design — Grille tarifaire"
        file: "data/event-design.json"
        fields:
          - label: "Image de la grille tarifaire"
            name: "pricingImage"
            widget: "image"
            hint: "Image affichée en bas de la page Event Design"

      # ── CONTACT — BIO & RÉSEAUX ───────────────────
      - name: "contact"
        label: "Contact — Bio & Réseaux sociaux"
        file: "data/contact.json"
        fields:
          - label: "Photo de fond (côté droit)"
            name: "profileBg"
            widget: "image"
          - label: "Paragraphes de la bio"
            name: "bio"
            widget: "list"
            hint: "Un paragraphe par ligne"
          - label: "Instagram — compte (ex : Mdt.Event)"
            name: "instagramHandle"
            widget: "string"
          - label: "Instagram — lien"
            name: "instagramUrl"
            widget: "string"
          - label: "Snapchat — compte"
            name: "snapchatHandle"
            widget: "string"
          - label: "Snapchat — lien"
            name: "snapchatUrl"
            widget: "string"
          - label: "Adresse email"
            name: "email"
            widget: "string"

      # ── GALERIE — IMAGES ──────────────────────────
      - name: "galerie"
        label: "Galerie — Toutes les images"
        file: "data/galerie.json"
        fields:
          - label: "Pochettes Musicales"
            name: "pochettes"
            widget: "list"
            hint: "Ajoute, supprime ou réordonne les pochettes"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Logos"
            name: "logos"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Flyers"
            name: "flyers"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - label: "Invitations"
            name: "invitations"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
